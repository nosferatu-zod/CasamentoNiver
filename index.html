<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Noiva Runner 💍</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: linear-gradient(to right, #ffe6f0, #ffffff);
    font-family: Arial;
    text-align: center;
    overflow: hidden;
}

h1, p {
    margin: 5px;
}

#container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: calc(100vh - 60px);
}

canvas {
    background: #fff;
    border: 3px solid #ffb6c1;
    border-radius: 10px;
    touch-action: manipulation;
}
</style>
</head>
<body>

<h1>Noiva Runner 💍</h1>
<p>Segure para pular mais alto</p>

<div id="container">
    <canvas id="game"></canvas>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const BASE_WIDTH = 800;
const BASE_HEIGHT = 200;

let scale = 1;

function resizeCanvas() {
    const screenWidth = window.innerWidth;
    const screenHeight = window.innerHeight - 60;

    scale = Math.min(screenWidth / BASE_WIDTH, screenHeight / BASE_HEIGHT);

    canvas.width = BASE_WIDTH * scale;
    canvas.height = BASE_HEIGHT * scale;

    ctx.setTransform(scale, 0, 0, scale, 0, 0);
}

window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function beep() {
    const audio = new AudioContext();
    const osc = audio.createOscillator();
    osc.frequency.setValueAtTime(500, audio.currentTime);
    osc.connect(audio.destination);
    osc.start();
    osc.stop(audio.currentTime + 0.1);
}

let noiva = {
    x: 50,
    y: 150,
    vy: 0,
    gravity: 0.5,
    grounded: true
};

let obstaculos = [];
let score = 0;
let gameOver = false;
let velocidade = 4;
let coracoes = [];

let pressionando = false;

function iniciarPulo() {
    if (noiva.grounded && !gameOver) {
        noiva.vy = -7;
        noiva.grounded = false;
        pressionando = true;
        beep();
    }
}

function pararPulo() {
    pressionando = false;
}

document.addEventListener("keydown", e => {
    if (e.code === "Space") iniciarPulo();
});
document.addEventListener("keyup", e => {
    if (e.code === "Space") pararPulo();
});

canvas.addEventListener("touchstart", iniciarPulo);
canvas.addEventListener("touchend", pararPulo);

function criarObstaculo() {
    const tipo = Math.random() > 0.5 ? "arvore" : "carro";
    obstaculos.push({ x: BASE_WIDTH, tipo });
}

function criarCoracao() {
    coracoes.push({
        x: Math.random() * BASE_WIDTH,
        y: BASE_HEIGHT,
        velocidade: 1 + Math.random()
    });
}

function update() {
    if (gameOver && score >= 1000) {
        if (Math.random() < 0.1) criarCoracao();
        coracoes.forEach(c => c.y -= c.velocidade);
        return;
    }

    if (gameOver) return;

    noiva.vy += noiva.gravity;
    noiva.y += noiva.vy;

    if (pressionando && noiva.vy < 0) {
        noiva.vy -= 0.3;
    }

    if (noiva.y >= 150) {
        noiva.y = 150;
        noiva.vy = 0;
        noiva.grounded = true;
    }

    velocidade += 0.001;

    if (Math.random() < 0.01) criarObstaculo();

    obstaculos.forEach((obs, i) => {
        obs.x -= velocidade;

        if (
            noiva.x + 10 < obs.x + 20 &&
            noiva.x + 20 > obs.x &&
            noiva.y + 10 < 180 &&
            noiva.y + 20 > 150
        ) {
            gameOver = true;
        }

        if (obs.x < -30) {
            obstaculos.splice(i, 1);
            score += 100;
        }
    });

    if (score >= 1000) gameOver = true;
}

function draw() {
    ctx.clearRect(0,0,BASE_WIDTH,BASE_HEIGHT);

    ctx.fillStyle = "#ddd";
    ctx.fillRect(0,180,BASE_WIDTH,5);

    if (score >= 800) {
        ctx.font = "40px Arial";
        ctx.fillText("⛪", 700, 160);
    }

    ctx.font = "25px Arial";
    ctx.fillText("👰🏾", noiva.x, noiva.y + 25);

    ctx.font = "25px Arial";
    obstaculos.forEach(obs => {
        ctx.fillText(obs.tipo === "arvore" ? "🌳" : "🚗", obs.x, 175);
    });

    ctx.fillStyle = "black";
    ctx.font = "14px Arial";
    ctx.fillText("Pontos: " + score, 650, 20);

    if (gameOver) {
        if (score >= 1000) {

            // fundo
            ctx.fillStyle = "rgba(0,0,0,0.7)";
            ctx.fillRect(50, 40, 700, 120);

            // texto reduzido
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.font = "14px Arial";

            let linhas = [
                "Feliz Aniversário de Casamento 💍",
                "",
                "Já passamos por muita coisa juntos,",
                "mas nosso amor sempre foi mais forte.",
                "",
                "Prometo estar sempre ao seu lado,",
                "te amar e te respeitar para sempre.",
                "",
                "Te amo Edna ❤️",
                "— Wesley"
            ];

            linhas.forEach((linha, i) => {
                ctx.fillText(linha, BASE_WIDTH / 2, 65 + (i * 12));
            });

            ctx.font = "20px Arial";
            coracoes.forEach(c => {
                ctx.fillText("❤️", c.x, c.y);
            });

        } else {
            ctx.fillStyle = "black";
            ctx.textAlign = "center";
            ctx.fillText("💔 Game Over!", BASE_WIDTH/2, 100);
        }
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
